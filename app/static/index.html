<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>DSP Pacing</title>
<style>
  :root {
    --bg: #0f1419; --fg: #e6e6e6; --muted: #888; --border: #2a2f3a;
    --row-hover: #1a1f2a; --panel: #1a1f2a;
    --green: #4ade80; --yellow: #facc15; --red: #f87171; --blue: #60a5fa; --gray: #6b7280;
  }
  body { background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; margin: 0; padding: 16px; font-size: 13px; }
  h1 { font-size: 18px; margin: 0 0 4px 0; }
  .meta { color: var(--muted); font-size: 12px; margin-bottom: 12px; }

  /* sync progress */
  #sync-bar { display: none; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; }
  #sync-bar.visible { display: block; }
  #sync-bar .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  #sync-bar .label { font-weight: 600; }
  #sync-bar .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  #sync-bar .track { background: #0f1419; border-radius: 4px; height: 6px; margin-top: 8px; overflow: hidden; }
  #sync-bar .fill { background: var(--blue); height: 100%; width: 0%; transition: width 0.4s ease; }

  /* summary pills */
  .summary { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .pill { padding: 6px 12px; border-radius: 999px; font-weight: 600; font-size: 12px; background: var(--panel); cursor: pointer; user-select: none; border: 1px solid transparent; }
  .pill.green { background: rgba(74,222,128,0.15); color: var(--green); }
  .pill.yellow { background: rgba(250,204,21,0.15); color: var(--yellow); }
  .pill.red { background: rgba(248,113,113,0.15); color: var(--red); }
  .pill.total { background: rgba(96,165,250,0.10); color: var(--blue); }
  .pill.active { border-color: currentColor; }

  /* filters */
  .filters { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
  .filters input, .filters select, .filters button {
    background: var(--panel); color: var(--fg); border: 1px solid var(--border);
    padding: 7px 11px; border-radius: 6px; font-size: 13px;
  }
  .filters input[type=text] { min-width: 280px; }
  .filters button { cursor: pointer; }
  .filters button:hover { background: #232936; }
  .filters button.primary { background: rgba(96,165,250,0.15); border-color: var(--blue); color: var(--blue); }
  .filters button.primary:hover { background: rgba(96,165,250,0.25); }
  .count { color: var(--muted); margin-left: auto; }

  /* table */
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--muted); font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { color: var(--fg); }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: var(--row-hover); }
  tbody td { padding: 8px 10px; vertical-align: top; }
  .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }

  .signal-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
  .signal-dot.green { background: var(--green); }
  .signal-dot.yellow { background: var(--yellow); }
  .signal-dot.red { background: var(--red); }
  tr.row-green { background: rgba(74,222,128,0.05); }
  tr.row-yellow { background: rgba(250,204,21,0.05); }
  tr.row-red { background: rgba(248,113,113,0.04); }

  .pace-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .pace-badge.green { background: rgba(74,222,128,0.18); color: var(--green); }
  .pace-badge.yellow { background: rgba(250,204,21,0.18); color: var(--yellow); }
  .pace-badge.red { background: rgba(248,113,113,0.18); color: var(--red); }

  .ellipsis { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .muted { color: var(--muted); font-size: 11px; }
  .loading { padding: 40px; text-align: center; color: var(--muted); }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>DSP Pacing</h1>
<div class="meta" id="meta">Загружаем кэш…</div>

<div id="sync-bar">
  <div class="top">
    <div>
      <div class="label" id="sync-label">Синхронизация…</div>
      <div class="sub" id="sync-sub">—</div>
    </div>
    <div class="muted" id="sync-elapsed">00:00</div>
  </div>
  <div class="track"><div class="fill" id="sync-fill"></div></div>
</div>

<div class="summary" id="summary"></div>

<div class="filters">
  <input type="text" id="search" placeholder="поиск: кампания / agency / advertiser…" />
  <button id="refresh-cache" title="перечитать локальный кэш">↻ обновить</button>
  <button id="sync-start" class="primary" title="обкачать Hybrid заново (~10 мин)">🔄 синхронизировать</button>
  <a href="/docs" target="_blank">/docs</a>
  <span class="count" id="count">—</span>
</div>

<table>
<thead>
<tr>
  <th data-key="signal" title="🟢 ≥100% • 🟡 70–100% • 🔴 &lt;70%">●</th>
  <th data-key="agency">Agency</th>
  <th data-key="advertiser_name">Advertiser</th>
  <th data-key="campaign_name">Кампания</th>
  <th data-key="limit_kind">Лимит</th>
  <th data-key="daily_target" class="num">Дневной</th>
  <th data-key="today_fact" class="num">Сегодня</th>
  <th data-key="period_fact" class="num">Текущий месяц</th>
  <th data-key="pace_today" class="num">% суточный</th>
  <th data-key="pace_overall" class="num">% за период</th>
  <th data-key="days_left" class="num">Дней до конца</th>
</tr>
</thead>
<tbody id="rows"><tr><td colspan="11" class="loading">загрузка…</td></tr></tbody>
</table>

<script>
let allData = [];
let sortKey = 'pace_overall';
let sortDir = -1; // по убыванию по умолчанию (худшие сверху? нет — лучшие сверху)
let signalFilter = ''; // '' | green | yellow | red
let pollTimer = null;

const SIGNAL_ORDER = { green: 0, yellow: 1, red: 2 };

function fmt(n, opts={}) {
  if (n === null || n === undefined) return '—';
  const { pct = false, int = false } = opts;
  if (pct) return (n * 100).toFixed(0) + '%';
  if (int) return Math.round(n).toLocaleString('ru-RU');
  return n.toLocaleString('ru-RU', { maximumFractionDigits: 2 });
}

function fmtMoney(value, unit, symbol, code) {
  if (value === null || value === undefined) return '—';
  if (unit === 'impressions') return fmt(value, {int: true}) + ' imp';
  if (unit === 'clicks') return fmt(value, {int: true}) + ' clk';
  // money
  const num = fmt(value, {int: true});
  return symbol ? `${num} ${symbol}` : `${num} ${code || ''}`;
}

function paceClass(p) {
  if (p === null || p === undefined) return '';
  if (p >= 1.0) return 'green';
  if (p >= 0.7) return 'yellow';
  return 'red';
}

function getCmp(key) {
  if (key === 'signal') return (a, b) => (SIGNAL_ORDER[a.signal] ?? 9) - (SIGNAL_ORDER[b.signal] ?? 9);
  return (a, b) => {
    const va = a[key], vb = b[key];
    if (va === vb) return 0;
    if (va === null || va === undefined) return 1;
    if (vb === null || vb === undefined) return -1;
    if (typeof va === 'number') return va - vb;
    return String(va).localeCompare(String(vb), 'ru');
  };
}

function render() {
  const search = document.getElementById('search').value.toLowerCase().trim();

  let items = allData.filter(x => {
    if (signalFilter && x.signal !== signalFilter) return false;
    if (search) {
      const hay = (x.campaign_name + ' ' + x.agency + ' ' + (x.advertiser_name || '')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  if (sortKey) {
    const cmp = getCmp(sortKey);
    items.sort((a, b) => cmp(a, b) * sortDir);
  }

  document.getElementById('count').textContent = `${items.length} строк`;

  const rows = items.map(x => {
    const sym = x.currency_symbol || '';
    const code = x.currency_code || '';
    const isMoney = x.limit_unit === 'money' || x.limit_unit === 'rubles';
    const limitLabel = isMoney
      ? `${x.limit_kind} <span class="muted">${code}</span>`
      : `${x.limit_kind} <span class="muted">${x.limit_unit}</span>`;
    return `
    <tr class="row-${x.signal}">
      <td><span class="signal-dot ${x.signal}" title="${escapeHtml(x.signal_reason || '')}"></span></td>
      <td class="ellipsis" title="${escapeHtml(x.agency)}">${escapeHtml(x.agency)}</td>
      <td class="ellipsis" title="${escapeHtml(x.advertiser_name || x.advertiser_id)}">${escapeHtml(x.advertiser_name || x.advertiser_id)}</td>
      <td class="ellipsis" title="${escapeHtml(x.campaign_name)}\n\n${escapeHtml(x.signal_reason || '')}">${escapeHtml(x.campaign_name)}</td>
      <td>${limitLabel}</td>
      <td class="num">${fmtMoney(x.daily_target, x.limit_unit, sym, code)}</td>
      <td class="num">${fmtMoney(x.today_fact, x.limit_unit, sym, code)}</td>
      <td class="num">${fmtMoney(x.period_fact, x.limit_unit, sym, code)}</td>
      <td class="num">${x.pace_today !== null ? `<span class="pace-badge ${paceClass(x.pace_today)}">${fmt(x.pace_today, {pct:true})}</span>` : '—'}</td>
      <td class="num">${x.pace_overall !== null ? `<span class="pace-badge ${paceClass(x.pace_overall)}">${fmt(x.pace_overall, {pct:true})}</span>` : `<span class="muted" title="общий план не считается — нет даты окончания">нет даты</span>`}</td>
      <td class="num">${x.is_dont_expire ? '∞' : (x.days_left ?? '—')}</td>
    </tr>`;
  }).join('');

  document.getElementById('rows').innerHTML = rows || `<tr><td colspan="11" class="loading">пусто</td></tr>`;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderSummary(byS, total) {
  const pills = [['', 'total', '🌐', total]];
  for (const k of ['green', 'yellow', 'red']) {
    const n = byS[k] || 0;
    const em = {green:'🟢',yellow:'🟡',red:'🔴'}[k];
    pills.push([k, k, em, n]);
  }
  document.getElementById('summary').innerHTML = pills.map(([key, cls, em, n]) => {
    const active = signalFilter === key ? 'active' : '';
    return `<span class="pill ${cls} ${active}" data-sig="${key}">${em} ${n}</span>`;
  }).join('');
  document.querySelectorAll('.pill').forEach(el => {
    el.addEventListener('click', () => {
      signalFilter = el.dataset.sig;
      renderSummary(byS, total);
      render();
    });
  });
}

async function loadCache() {
  document.getElementById('rows').innerHTML = '<tr><td colspan="11" class="loading">загружаем кэш…</td></tr>';
  const [sum, items] = await Promise.all([
    fetch('/cache/summary').then(r => r.json()),
    fetch('/cache/all').then(r => r.json()),
  ]);
  allData = items;
  const byS = sum.by_signal || {};
  const ts = sum.cached_at_utc;
  document.getElementById('meta').textContent = ts
    ? `Последний синк: ${new Date(ts + 'Z').toLocaleString('ru-RU')} • ${sum.total} активных кампаний`
    : 'Кэш пустой — нажми "синхронизировать"';
  renderSummary(byS, sum.total || 0);
  render();
}

function fmtElapsed(s) {
  if (!s) return '00:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

async function pollSync() {
  let st;
  try { st = await fetch('/sync/status').then(r => r.json()); }
  catch (e) { return; }
  const bar = document.getElementById('sync-bar');
  const fill = document.getElementById('sync-fill');
  const label = document.getElementById('sync-label');
  const sub = document.getElementById('sync-sub');
  const elapsed = document.getElementById('sync-elapsed');

  if (st.status === 'running') {
    bar.classList.add('visible');
    const pct = st.total ? Math.round(100 * st.current / st.total) : 0;
    fill.style.width = pct + '%';
    label.textContent = `Синхронизация: ${st.current}/${st.total} агентств (${pct}%)`;
    sub.textContent = `Сейчас: ${st.current_agency || '…'} • собрано кампаний: ${st.campaigns_collected || 0}`;
    elapsed.textContent = fmtElapsed(st.elapsed_seconds);
  } else if (st.status === 'done') {
    bar.classList.add('visible');
    fill.style.width = '100%';
    label.textContent = `✅ Синхронизация завершена за ${fmtElapsed(st.elapsed_seconds)}`;
    sub.textContent = `Кампаний собрано: ${st.campaigns_collected || 0}`;
    elapsed.textContent = fmtElapsed(st.elapsed_seconds);
    // загрузить новые данные и убрать бар через 5 сек
    await loadCache();
    setTimeout(() => bar.classList.remove('visible'), 5000);
    stopPolling();
  } else if (st.status === 'error') {
    bar.classList.add('visible');
    label.textContent = `❌ Ошибка синка`;
    sub.textContent = st.error || 'unknown';
    stopPolling();
  } else if (st.status === 'idle') {
    bar.classList.remove('visible');
  }
}

function startPolling() {
  stopPolling();
  pollSync();
  pollTimer = setInterval(pollSync, 1500);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('refresh-cache').addEventListener('click', loadCache);
document.getElementById('sync-start').addEventListener('click', async () => {
  if (!confirm('Запустить полный синк? Идёт в фоне ~5-10 минут, прогресс будет наверху.')) return;
  const r = await fetch('/sync/start', { method: 'POST' }).then(r => r.json());
  if (!r.started && r.reason === 'already_running') alert('Синк уже идёт');
  startPolling();
});

document.querySelectorAll('thead th[data-key]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.key;
    if (sortKey === k) sortDir = -sortDir;
    else { sortKey = k; sortDir = k === 'pace_overall' || k === 'pace_today' ? -1 : 1; }
    document.querySelectorAll('thead th').forEach(h => h.textContent = h.textContent.replace(/ [↑↓]$/, ''));
    th.textContent += sortDir === 1 ? ' ↑' : ' ↓';
    render();
  });
});

// при загрузке: подцепить кэш и проверить — вдруг уже идёт синк
(async () => {
  await loadCache();
  const st = await fetch('/sync/status').then(r => r.json()).catch(() => null);
  if (st && st.status === 'running') startPolling();
})();
</script>
</body>
</html>
